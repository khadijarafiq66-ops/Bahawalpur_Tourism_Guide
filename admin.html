<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Royal Bahawalpur Admin Panel</title>

<style>
body{
    font-family:poppins;
    background:#111;
    color:#fff;
    padding:20px;
}

h1{
    color:gold;
}

select, input, textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

button{
    padding:10px 15px;
    background:gold;
    border:none;
    cursor:pointer;
    font-weight:bold;
}

.card{
    background:#222;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete{
    background:red;
    color:#fff;
    border:none;
    padding:5px 10px;
    cursor:pointer;
}

.section-title{
    color:gold;
    margin-top:20px;
}
</style>
</head>

<body>

<h1>Admin Panel</h1>


<select id="category">
    <option value="places">Places</option>
    <option value="foods">Foods</option>
    <option value="hotels">Hotels</option>
    <option value="restaurants">Restaurants</option>
</select>

<!-- FORM -->
<input type="text" id="title" placeholder="Title">
<input type="text" id="short" placeholder="Short Description">
<textarea id="description" placeholder="Full Description"></textarea>
<input type="text" id="image" placeholder="Image URL">

<button onclick="addItem()">Add Item</button>

<!-- LIST -->
<div id="list"></div>

<script>
const baseURL = "http://localhost:3001";

let editId = null;

/* INIT */
document.addEventListener("DOMContentLoaded", () => {
    loadData();

    document.getElementById("category")
    .addEventListener("change", loadData);

    document.getElementById("submitBtn")
    .addEventListener("click", addItem);
});

/* LOAD DATA */
function loadData() {

    const cat = document.getElementById("category").value;

    fetch(`${baseURL}/${cat}`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(item => {

            const card = document.createElement("div");
            card.className = "card";

            card.innerHTML = `
                <div>
                    <b>${item.title}</b><br>
                    <small>${item.short}</small>
                </div>

                <div>
                    <button class="edit-btn">✏️ Edit</button>
                    <button class="delete-btn">🗑 Delete</button>
                </div>
            `;

            card.querySelector(".edit-btn")
            .addEventListener("click", () => editItem(item.id));

            card.querySelector(".delete-btn")
            .addEventListener("click", () => deleteItem(item.id));

            list.appendChild(card);
        });
    });
}

/* ADD / UPDATE */
function addItem(){

    const cat = document.getElementById("category").value;

    const item = {
        title: document.getElementById("title").value,
        short: document.getElementById("short").value,
        description: document.getElementById("description").value,
        image: document.getElementById("image").value
    };

    if(editId){

        fetch(`${baseURL}/${cat}/${editId}`,{
            method:"PUT",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(item)
        })
        .then(() => {
            alert("Updated Successfully");
            editId = null;
            document.getElementById("submitBtn").innerText = "Add Item";
            clearForm();
            loadData();
        });

    } else {

        fetch(`${baseURL}/${cat}`,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body: JSON.stringify(item)
        })
        .then(() => {
            alert("Added Successfully");
            clearForm();
            loadData();
        });
    }
}

/* EDIT */
function editItem(id){

    const cat = document.getElementById("category").value;

    fetch(`${baseURL}/${cat}/${id}`)
    .then(res => res.json())
    .then(item => {

        document.getElementById("title").value = item.title;
        document.getElementById("short").value = item.short;
        document.getElementById("description").value = item.description;
        document.getElementById("image").value = item.image;

        editId = id;

        document.getElementById("submitBtn").innerText = "Update Item";
    });
}

/* DELETE */
function deleteItem(id){

    const cat = document.getElementById("category").value;

    if(!confirm("Delete this item?")) return;

    fetch(`${baseURL}/${cat}/${id}`,{
        method:"DELETE"
    })
    .then(() => loadData());
}

/* CLEAR */
function clearForm(){
    document.getElementById("title").value = "";
    document.getElementById("short").value = "";
    document.getElementById("description").value = "";
    document.getElementById("image").value = "";
}
</script>

</body>
</html>
